# Phala Cloud TEE Deployment Configuration
# Deploy with: phala cvms create --name signal-bot-tee --compose ./phala-compose.yaml --vcpu 2 --memory 4096 --disk-size 20

services:
  signal-api:
    # Pinned to specific digest for TEE attestation integrity
    image: bbernhard/signal-cli-rest-api@sha256:c51c117d030d051f0cf2ef17f2cb135f1301810f9526a224be67daded8f272d6
    container_name: signal-api
    environment:
      - MODE=json-rpc
      # json-rpc mode: persistent JVM daemon, WebSocket message streaming.
      # The bot connects via WebSocket to /v1/receive/{account} instead of polling.
      - LOG_LEVEL=info
    # TEMPORARY: Port exposed for debugging - remove after fixing
    ports:
      - "8080:8080"
    volumes:
      - signal-config-v6:/home/.local/share/signal-cli
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  signal-bot:
    # Image hosted on Docker Hub
    image: turetzkyron/signal-bot-tee:latest
    container_name: signal-bot
    environment:
      # Signal configuration - polls ALL registered accounts automatically
      - SIGNAL__SERVICE_URL=http://signal-api:8080
      - SIGNAL__USE_WEBSOCKET=true
      # NEAR AI configuration - hardcoded for debugging
      - NEAR_AI__API_KEY=${NEAR_AI_API_KEY}
      - NEAR_AI__BASE_URL=https://cloud-api.near.ai/v1
      - NEAR_AI__MODEL=deepseek-ai/DeepSeek-V3.1
      # Conversation settings
      - CONVERSATION__MAX_MESSAGES=${CONVERSATION_MAX_MESSAGES:-50}
      - CONVERSATION__TTL=${CONVERSATION_TTL:-24h}
      # Bot settings - debug for troubleshooting
      - BOT__LOG_LEVEL=debug
      - BOT__SIGNAL_USERNAME=nearai.54
      - BOT__GITHUB_REPO=https://github.com/zmanian/signal-bot-tee
      # Tools configuration
      - TOOLS__ENABLED=${TOOLS_ENABLED:-true}
      - TOOLS__WEB_SEARCH__API_KEY=${TOOLS_WEB_SEARCH_API_KEY}
      # Translation configuration
      - TRANSLATION__ENABLED=${TRANSLATION_ENABLED:-false}
      - TRANSLATION__LIBRETRANSLATE_URL=http://libretranslate:5000
      - TRANSLATION__GROUPS=${TRANSLATION_GROUPS:-}
      - TRANSLATION__ALSO_CHAT=${TRANSLATION_ALSO_CHAT:-false}
      # Payment/credit tracking (set to true to enable)
      - PAYMENTS__ENABLED=false
      # Dstack TEE socket - provided by Phala CVM
      - DSTACK__SOCKET_PATH=/var/run/dstack.sock
    volumes:
      # Dstack socket for TEE attestation (provided by Phala CVM)
      - /var/run/dstack.sock:/var/run/dstack.sock:ro
    depends_on:
      - signal-api
    restart: unless-stopped

  signal-registration-proxy:
    # Image hosted on Docker Hub
    image: turetzkyron/signal-registration-proxy:latest
    container_name: signal-registration-proxy
    environment:
      # Signal API (internal)
      - SIGNAL__API_URL=http://signal-api:8080
      # Registry storage
      - REGISTRY__PATH=/data/registry.enc
      # Server settings
      - SERVER__LISTEN_ADDR=0.0.0.0
      - SERVER__PORT=8081
      # Dstack TEE socket - provided by Phala CVM
      - DSTACK__SOCKET_PATH=/var/run/dstack.sock
      # Rate limiting (increased for frontend usage)
      - RATE_LIMIT__GLOBAL_PER_MINUTE=${RATE_LIMIT_GLOBAL_PER_MINUTE:-60}
      - RATE_LIMIT__PER_NUMBER_PER_HOUR=${RATE_LIMIT_PER_NUMBER_PER_HOUR:-10}
      # Logging
      - LOG__LEVEL=${LOG_LEVEL:-info}
    volumes:
      # Dstack socket for TEE attestation and key derivation
      - /var/run/dstack.sock:/var/run/dstack.sock:ro
      # Encrypted registry persistence
      - registry-data:/data
    ports:
      # Expose registration API externally
      - "8081:8081"
    depends_on:
      - signal-api
    restart: unless-stopped

  libretranslate:
    image: libretranslate/libretranslate:v1.6.3
    container_name: libretranslate
    environment:
      - LT_LOAD_ONLY=${LT_LOAD_ONLY:-en,es}
      - LT_DISABLE_WEB_UI=true
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/languages"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    restart: unless-stopped

volumes:
  signal-config-v6:
    driver: local
  registry-data:
    driver: local
